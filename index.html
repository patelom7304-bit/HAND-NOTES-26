<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Portfolio | 3D Experience</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Inter', -apple-system, sans-serif; background: #050505; color: white; }
        canvas { display: block; }
        
        /* Glassmorphism UI overlay */
        #ui-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            width: 100%;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 24px;
            display: inline-block;
            pointer-events: auto;
            transition: transform 0.3s ease;
            max-width: 400px;
        }

        .card:hover { transform: translateY(-10px); }
        h1 { font-size: 2.5rem; margin: 0; background: linear-gradient(45deg, #00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #aaa; margin: 1rem 0; font-size: 1.1rem; }
        
        .badge-container { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        .badge { background: rgba(79, 172, 254, 0.2); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; border: 1px solid #4facfe; }

        .btn {
            margin-top: 25px;
            display: inline-block;
            padding: 12px 30px;
            background: #4facfe;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background: #00f2fe; box-shadow: 0 0 20px rgba(0, 242, 254, 0.5); }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="card">
            <h1>Creative Visuals</h1>
            <p>Professional Content Creator & Video Editor</p>
            <div class="badge-container">
                <span class="badge">3D Design</span>
                <span class="badge">Video Editing</span>
                <span class="badge">Thumbnails</span>
            </div>
            <a href="mailto:your-email@example.com" class="btn">Let's Connect</a>
        </div>
    </div>

    <script>
        // 1. Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Create Floating Particles/Geometry
        const geometry = new THREE.IcosahedronGeometry(1, 1);
        const material = new THREE.MeshPhongMaterial({
            color: 0x4facfe,
            wireframe: true,
            transparent: true,
            opacity: 0.5
        });

        const shapes = [];
        for(let i = 0; i < 20; i++) {
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(
                (Math.random() - 0.5) * 10,
                (Math.random() - 0.5) * 10,
                (Math.random() - 0.5) * 10
            );
            mesh.rotation.set(Math.random() * 2, Math.random() * 2, 0);
            scene.add(mesh);
            shapes.push(mesh);
        }

        // 3. Lighting
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(1, 1, 2);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        camera.position.z = 5;

        // 4. Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            
            shapes.forEach(shape => {
                shape.rotation.x += 0.005;
                shape.rotation.y += 0.005;
            });

            renderer.render(scene, camera);
        }

        // 5. Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Mouse Move Effect
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 2;
            const y = (e.clientY / window.innerHeight - 0.5) * 2;
            camera.position.x += (x - camera.position.x) * 0.05;
            camera.position.y += (-y - camera.position.y) * 0.05;
            camera.lookAt(scene.position);
        });

        animate();
    </script>
</body>
</html>
